version: "3.9"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: streampulse-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - streampulse-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: streampulse-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - streampulse-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: streampulse-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: streampulse
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - streampulse-network

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: streampulse-timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: streampulse
      POSTGRES_PASSWORD: StreamPulse@2026
      POSTGRES_DB: streampulse_db
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    networks:
      - streampulse-network

  redis:
    image: redis:7-alpine
    container_name: streampulse-redis
    ports:
      - "6380:6379"
    networks:
      - streampulse-network

  ingestion:
    build:
      context: ./services/ingestion
    container_name: streampulse-ingestion
    ports:
      - "8001:8001"
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SYMBOLS: AAPL,GOOGL,MSFT,INFY,TCS
    networks:
      - streampulse-network
    restart: on-failure

  processor:
    build:
      context: ./services/processor
    container_name: streampulse-processor
    ports:
      - "5100:5100"
    depends_on:
      - kafka
      - ingestion
      - timescaledb
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      DOTNET_ENVIRONMENT: Docker
      KafkaSettings__BootstrapServers: kafka:29092
      KafkaSettings__ConsumerGroup: processor-group
      DatabaseSettings__ConnectionString: "Host=timescaledb;Port=5432;Database=streampulse_db;Username=streampulse;Password=StreamPulse@2026"
    networks:
      - streampulse-network
    restart: on-failure

  anomaly:
    build:
      context: ./services/anomaly
    container_name: streampulse-anomaly
    ports:
      - "8003:8003"
    depends_on:
      - kafka
      - ingestion
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    networks:
      - streampulse-network
    restart: on-failure

networks:
  streampulse-network:
    driver: bridge

volumes:
  timescaledb_data:
