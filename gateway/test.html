<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>StreamPulse SignalR Test</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
  <style>
    body { font-family: monospace; background: #0d0d0d; color: #00ff88; padding: 20px; }
    h1 { color: #00ccff; }
    #log { background: #111; padding: 12px; border: 1px solid #333; height: 400px; overflow-y: auto; }
    .tick { color: #aaffaa; }
    .forecast { color: #aaccff; }
    .alert { color: #ffaaaa; }
    .info { color: #888; }
    button { margin: 4px; padding: 8px 14px; background: #1a1a2e; color: #00ff88; border: 1px solid #00ff88; cursor: pointer; }
    button:hover { background: #00ff88; color: #000; }
    input { background: #111; color: #fff; border: 1px solid #555; padding: 6px; margin: 4px; }
  </style>
</head>
<body>
  <h1>StreamPulse — SignalR Live Feed</h1>
  <div>
    <input id="hubUrl" value="http://localhost:5000/hubs/stock" style="width:300px" />
    <button onclick="connect()">Connect</button>
    <button onclick="disconnect()">Disconnect</button>
  </div>
  <div style="margin:8px 0">
    <input id="symbol" value="AAPL" style="width:80px" placeholder="Symbol" />
    <button onclick="joinGroup()">Join Symbol Group</button>
    <button onclick="joinAll()">Join All Symbols</button>
  </div>
  <div id="status" class="info">Disconnected</div>
  <div id="log"></div>

  <script>
    let connection = null;

    function log(msg, cls = '') {
      const div = document.createElement('div');
      div.className = cls;
      div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      const logEl = document.getElementById('log');
      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
    }

    async function connect() {
      const url = document.getElementById('hubUrl').value;
      connection = new signalR.HubConnectionBuilder()
        .withUrl(url)
        .withAutomaticReconnect()
        .build();

      connection.on('ReceiveTick', (tick) => {
        log(`TICK  ${tick.symbol} @ $${tick.price?.toFixed(2)} | vol=${tick.volume} | chg=${tick.change_pct?.toFixed(2)}%`, 'tick');
      });

      connection.on('ReceiveForecast', (f) => {
        log(`FCST  ${f.symbol} predicted=$${f.predicted_close?.toFixed(2)} | conf=${(f.confidence*100).toFixed(1)}%`, 'forecast');
      });

      connection.on('ReceiveAlert', (a) => {
        log(`ALERT [${a.severity}] ${a.alert_type} — ${a.symbol} @ $${a.price?.toFixed(2)} | score=${a.anomaly_score?.toFixed(3)}`, 'alert');
      });

      connection.on('ReceiveCandle', (c) => {
        log(`OHLCV ${c.symbol} O=${c.openPrice?.toFixed(2)} H=${c.highPrice?.toFixed(2)} L=${c.lowPrice?.toFixed(2)} C=${c.closePrice?.toFixed(2)}`, 'info');
      });

      connection.onclose(() => {
        document.getElementById('status').textContent = 'Disconnected';
        log('Connection closed.', 'info');
      });

      try {
        await connection.start();
        document.getElementById('status').textContent = `Connected: ${connection.connectionId}`;
        log(`Connected to ${url}`, 'info');
      } catch (err) {
        log(`Connection failed: ${err}`, 'alert');
      }
    }

    async function disconnect() {
      if (connection) await connection.stop();
    }

    async function joinGroup() {
      const sym = document.getElementById('symbol').value.toUpperCase();
      if (!connection) { log('Not connected', 'alert'); return; }
      await connection.invoke('JoinSymbolGroup', sym);
      log(`Joined group: ${sym}`, 'info');
    }

    async function joinAll() {
      if (!connection) { log('Not connected', 'alert'); return; }
      await connection.invoke('JoinAllSymbols');
      log('Joined ALL_SYMBOLS group', 'info');
    }
  </script>
</body>
</html>
